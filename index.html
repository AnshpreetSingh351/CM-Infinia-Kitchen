<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CM Infinia — Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Sora:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C4A265;--gold-light:#D4B87A;--cream:#FAF6F0;--dark:#080806;--warm:#7A756D}
html,body{height:100%;overflow:hidden;background:var(--dark);font-family:'Sora',sans-serif;color:var(--cream);-webkit-font-smoothing:antialiased}

/* ── PAGE ── */
.page{width:100%;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ── TOP SECTION ── */
.top-section{
  flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:1.2rem 1.5rem 1rem;position:relative;z-index:5;
}
.logo-row{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;margin-bottom:.8rem;
}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;letter-spacing:.02em}
.logo span{color:var(--gold)}
.logo-tag{font-size:.45rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);opacity:.5}

.tagline{text-align:center;padding:0 1.5rem}
.tl-sub{
  font-size:.45rem;font-weight:500;letter-spacing:.45em;text-transform:uppercase;
  color:var(--gold);margin-bottom:.6rem;
  opacity:0;animation:fadeUp .8s ease .3s forwards;
}
.tl-main{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.2rem,7vw,4.5rem);font-weight:300;line-height:1.05;
  opacity:0;animation:fadeUp .8s ease .5s forwards;
}
.tl-main em{font-style:italic;color:var(--gold-light);font-weight:400}
.tl-main strong{font-weight:700}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── PANORAMA STRIP ── */
.pano-section{
  flex:1;min-height:0;
  position:relative;overflow:hidden;
  transition:height .9s cubic-bezier(.4,0,.2,1), min-height .9s cubic-bezier(.4,0,.2,1), flex .9s cubic-bezier(.4,0,.2,1);
}
.pano-section.expanded{position:fixed;inset:0;z-index:15;height:100%;flex:none}

/* Golden border lines */
.pano-section::before,.pano-section::after{
  content:'';position:absolute;left:0;right:0;height:1px;z-index:6;
  background:linear-gradient(90deg,transparent,rgba(196,162,101,.3) 20%,rgba(196,162,101,.3) 80%,transparent);
  transition:opacity .5s;
}
.pano-section::before{top:0}
.pano-section::after{bottom:0}
.pano-section.expanded::before,.pano-section.expanded::after{opacity:0}

.pano-track{
  position:absolute;top:0;height:100%;display:flex;
  will-change:transform;cursor:grab;
}
.pano-track:active{cursor:grabbing}
.pano-track img{
  height:100%;width:auto;display:block;
  filter:brightness(.85) contrast(1.06) saturate(1.05);
  -webkit-user-drag:none;user-select:none;pointer-events:none;
}

/* Fade edges */
.pano-fade-l,.pano-fade-r{
  position:absolute;top:0;bottom:0;width:15%;z-index:3;pointer-events:none;
  transition:opacity .5s;
}
.pano-fade-l{left:0;background:linear-gradient(90deg,var(--dark),transparent)}
.pano-fade-r{right:0;background:linear-gradient(270deg,var(--dark),transparent)}
.pano-section.expanded .pano-fade-l,.pano-section.expanded .pano-fade-r{opacity:.3}

/* Degree indicator floating on strip */
.deg-float{
  position:absolute;top:1rem;right:1.5rem;z-index:8;
  display:flex;align-items:baseline;gap:.2rem;
  opacity:0;animation:fadeUp .6s ease 1s forwards;
}
.deg-num{font-size:1.1rem;font-weight:300;font-variant-numeric:tabular-nums;color:var(--cream);opacity:.7}
.deg-num sup{font-size:.4rem;color:var(--gold);vertical-align:super}

/* Drag hint inside strip */
.strip-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:8;
  display:flex;align-items:center;gap:.7rem;
  background:rgba(8,8,6,.5);backdrop-filter:blur(8px);
  padding:.45rem 1rem;border-radius:100px;
  border:1px solid rgba(196,162,101,.15);
  opacity:0;animation:fadeUp .6s ease 1.2s forwards;
  transition:opacity .5s;pointer-events:none;
}
.strip-hint.gone{opacity:0!important}
.strip-hint svg{animation:swipeH 2s ease-in-out infinite;color:var(--gold)}
@keyframes swipeH{0%,100%{transform:translateX(-4px);opacity:.3}50%{transform:translateX(4px);opacity:.8}}
.strip-hint span{font-size:.4rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold-light)}

/* Location tags */
.loc{
  position:absolute;z-index:7;
  display:flex;flex-direction:column;align-items:center;gap:0;
  pointer-events:none;opacity:0;transition:opacity .4s;
}
.loc.vis{opacity:1}
.loc-pin{
  width:8px;height:8px;border:1.5px solid var(--gold);border-radius:50%;
  background:rgba(196,162,101,.15);position:relative;
}
.loc-pin::after{
  content:'';position:absolute;inset:-5px;border:1px solid rgba(196,162,101,.15);
  border-radius:50%;animation:ping 2.5s ease-in-out infinite;
}
@keyframes ping{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.4);opacity:0}}
.loc-line{width:1px;height:18px;background:linear-gradient(180deg,var(--gold),transparent)}
.loc-name{
  font-size:.38rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-light);
  background:rgba(8,8,6,.5);backdrop-filter:blur(6px);
  padding:.2rem .45rem;border-radius:3px;border:1px solid rgba(196,162,101,.1);
  white-space:nowrap;margin-top:2px;
}

/* ── BOTTOM SECTION ── */
.bot-section{
  flex:0 0 auto;padding:1.5rem;
  display:flex;justify-content:space-between;align-items:center;
  position:relative;z-index:5;
  transition:opacity .5s,transform .5s;
}
.bot-section.hidden{opacity:0;transform:translateY(20px);pointer-events:none}

.bot-left{display:flex;flex-direction:column;gap:.3rem}
.bot-small{font-size:.4rem;letter-spacing:.3em;text-transform:uppercase;color:var(--warm)}
.bot-big{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--cream);opacity:.8}

.explore-btn{
  display:inline-flex;align-items:center;gap:.6rem;
  padding:.75rem 1.8rem;border-radius:100px;
  background:linear-gradient(135deg,var(--gold),#A8884F);
  color:var(--dark);font-family:'Sora',sans-serif;
  font-size:.65rem;font-weight:600;letter-spacing:.08em;
  border:none;cursor:pointer;transition:all .4s;
  box-shadow:0 4px 20px rgba(196,162,101,.2);
  opacity:0;animation:fadeUp .7s ease .8s forwards;
}
.explore-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(196,162,101,.35)}
.explore-btn svg{width:14px;height:14px;transition:transform .3s}
.explore-btn:hover svg{transform:translateX(3px)}

/* ── EXPANDED OVERLAY UI ── */
.expanded-ui{
  position:fixed;inset:0;z-index:10;pointer-events:none;
  opacity:0;transition:opacity .5s;
}
.expanded-ui.show{opacity:1}

.exp-top{
  position:absolute;top:0;left:0;right:0;
  padding:1.2rem 1.5rem;
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(180deg,rgba(8,8,6,.7),transparent);
  pointer-events:auto;
}
.exp-logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700}
.exp-logo span{color:var(--gold)}
.close-btn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(196,162,101,.08);border:1px solid rgba(196,162,101,.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--gold);font-size:.7rem;transition:all .3s;
}
.close-btn:hover{background:var(--gold);color:var(--dark)}

.exp-bot{
  position:absolute;bottom:0;left:0;right:0;
  padding:1.5rem;
  background:linear-gradient(0deg,rgba(8,8,6,.8),transparent);
  pointer-events:auto;
  display:flex;justify-content:space-between;align-items:flex-end;
}
.exp-info{display:flex;flex-direction:column;gap:.3rem}
.exp-tag{font-size:.4rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:.5rem}
.exp-tag::before{content:'';width:12px;height:1px;background:var(--gold)}
.exp-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.3rem,4vw,2rem);font-weight:700;line-height:1.1}
.exp-title em{font-style:italic;color:var(--gold-light);font-weight:400}
.exp-deg{font-size:1.4rem;font-weight:300;font-variant-numeric:tabular-nums;color:var(--cream);opacity:.6}
.exp-deg sup{font-size:.4rem;color:var(--gold);vertical-align:super}

.book-float{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.55rem 1.1rem;border-radius:100px;
  background:rgba(196,162,101,.08);border:1px solid rgba(196,162,101,.2);
  backdrop-filter:blur(8px);
  color:var(--gold-light);font-size:.55rem;font-weight:500;letter-spacing:.06em;
  cursor:pointer;text-decoration:none;transition:all .3s;pointer-events:auto;
}
.book-float:hover{background:var(--gold);color:var(--dark)}

/* ── SOUND TOGGLE ── */
.sound-btn{
  position:fixed;top:1.2rem;right:1.5rem;z-index:20;
  width:36px;height:36px;border-radius:50%;
  background:rgba(196,162,101,.06);border:1px solid rgba(196,162,101,.18);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--gold);transition:all .3s;
  backdrop-filter:blur(6px);
}
.sound-btn:hover{background:rgba(196,162,101,.15);border-color:var(--gold)}
.sound-btn svg{width:14px;height:14px}
.sound-bars{display:flex;align-items:flex-end;gap:2px;height:12px}
.sound-bars span{
  width:2px;background:var(--gold);border-radius:1px;
  animation:barAnim 1.2s ease-in-out infinite;
}
.sound-bars span:nth-child(1){height:4px;animation-delay:0s}
.sound-bars span:nth-child(2){height:8px;animation-delay:.15s}
.sound-bars span:nth-child(3){height:5px;animation-delay:.3s}
.sound-bars span:nth-child(4){height:10px;animation-delay:.1s}
@keyframes barAnim{0%,100%{height:3px}50%{height:11px}}
.sound-btn.muted .sound-bars span{animation:none;height:2px;opacity:.3}


@media(max-width:480px){
  .top-section{padding:.8rem 1rem .6rem}
  .logo{font-size:1.05rem}
  .logo-row{margin-bottom:.5rem}
  .tl-main{font-size:clamp(1.5rem,6.5vw,2.2rem)}
  .tl-sub{margin-bottom:.25rem;font-size:.38rem}
  .tagline{padding:0 .5rem}
  .bot-section{flex-direction:column;gap:.5rem;align-items:flex-start;padding:.7rem 1rem}
  .bot-big{font-size:.85rem}
  .bot-small{font-size:.35rem}
  .explore-btn{align-self:stretch;justify-content:center;padding:.6rem 1.2rem;font-size:.58rem}
  .deg-float{top:.5rem;right:.8rem}
  .exp-bot{padding:1rem;flex-direction:column;gap:.6rem;align-items:flex-start}
  .sound-btn{top:.7rem;right:.8rem;width:32px;height:32px}
}
@media(max-width:380px){
  .top-section{padding:.6rem .8rem .5rem}
  .tl-main{font-size:1.35rem}
  .bot-section{padding:.5rem .8rem}
  .logo-row{margin-bottom:.3rem}
}
@media(min-width:768px){
  .top-section{padding:1.8rem 2.5rem 1.5rem}
  .logo-row{margin-bottom:1rem}
}
</style>
</head>
<body>

<div class="page" id="page">
  <!-- TOP -->
  <div class="top-section" id="topSec">
    <div class="logo-row">
      <div class="logo">CM <span>Infinia</span></div>
      <div class="logo-tag">Luxury Living</div>
    </div>
    <div class="tagline">
      <div class="tl-sub">Kitchen · 360°</div>
      <div class="tl-main">Where <em>Elegance</em><br>Meets <strong>Function</strong></div>
    </div>
  </div>

  <!-- PANORAMA STRIP -->
  <div class="pano-section" id="panoSec">
    <div class="pano-track" id="track">
      <img id="img1"><img id="img2">
    </div>
    <div class="pano-fade-l"></div>
    <div class="pano-fade-r"></div>
    <div class="deg-float"><span class="deg-num" id="degNum">0<sup>°</sup></span></div>
    <div class="strip-hint" id="stripHint">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5 12h14M5 12l3-3M5 12l3 3M19 12l-3-3M19 12l-3 3"/></svg>
      <span>Drag to Rotate</span>
    </div>
    <!-- Location pins -->
    <div class="loc" data-xp="18" data-yp="45"><div class="loc-pin"></div><div class="loc-line"></div><div class="loc-name">Built-in Sink</div></div>
    <div class="loc" data-xp="50" data-yp="35"><div class="loc-pin"></div><div class="loc-line"></div><div class="loc-name">Modular Storage</div></div>
    <div class="loc" data-xp="70" data-yp="48"><div class="loc-pin"></div><div class="loc-line"></div><div class="loc-name">Gas Cooktop</div></div>
    <div class="loc" data-xp="88" data-yp="40"><div class="loc-pin"></div><div class="loc-line"></div><div class="loc-name">Built-in Oven</div></div>
  </div>

  <!-- BOTTOM -->
  <div class="bot-section" id="botSec">
    <div class="bot-left">
      <div class="bot-small">Premium Modular Kitchen</div>
      <div class="bot-big">Experience it in 360°</div>
    </div>
    <button class="explore-btn" id="exploreBtn">
      Explore Kitchen
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>
  </div>
</div>

<!-- Sound toggle -->
<button class="sound-btn" id="soundBtn" title="Toggle Sound">
  <div class="sound-bars"><span></span><span></span><span></span><span></span></div>
</button>

<!-- Expanded fullscreen UI -->
<div class="expanded-ui" id="expUI">
  <div class="exp-top">
    <div class="exp-logo">CM <span>Infinia</span></div>
    <div class="close-btn" id="closeBtn">✕</div>
  </div>
  <div class="exp-bot">
    <div class="exp-info">
      <div class="exp-tag">360° Kitchen</div>
      <div class="exp-title">The Heart of <em>Infinia</em></div>
    </div>
    <div style="display:flex;align-items:center;gap:1rem">
      <span class="exp-deg" id="expDeg">0<sup>°</sup></span>
      <a href="#" class="book-float">Book Visit →</a>
    </div>
  </div>
</div>

const track=document.getElementById('track'),img1=document.getElementById('img1'),img2=document.getElementById('img2');
const degNum=document.getElementById('degNum'),expDeg=document.getElementById('expDeg');
const panoSec=document.getElementById('panoSec'),topSec=document.getElementById('topSec'),botSec=document.getElementById('botSec');
const expUI=document.getElementById('expUI'),stripHint=document.getElementById('stripHint');
const locs=document.querySelectorAll('.loc');

let W=window.innerWidth,H=window.innerHeight;
let imgW=0,offset=0,dragging=false,dragX=0,momentum=0,expanded=false,interacted=false;

img1.src=IMG_SRC;img2.src=IMG_SRC;
img1.onload=()=>{imgW=img1.offsetWidth;update()};
if(img1.complete&&img1.naturalWidth){imgW=img1.offsetWidth}

function wrap(v){v=v%imgW;if(v>0)v-=imgW;return v}

function update(){
  if(!imgW)return;
  offset=wrap(offset);
  track.style.transform=`translateX(${offset}px)`;
  const pct=Math.abs(offset)/imgW;
  const deg=Math.round(pct*360)%360;
  degNum.innerHTML=deg+'<sup>°</sup>';
  expDeg.innerHTML=deg+'<sup>°</sup>';

  const secH=panoSec.offsetHeight;
  locs.forEach(t=>{
    const xp=+t.dataset.xp/100,yp=+t.dataset.yp/100;
    let ax=offset+xp*imgW;
    if(ax<-20)ax+=imgW;if(ax>W+20)ax-=imgW;
    t.style.left=ax+'px';t.style.top=(yp*secH)+'px';
    t.classList.toggle('vis',ax>20&&ax<W-20);
  });
}

function loop(){
  if(!dragging){
    if(Math.abs(momentum)>0.2){offset+=momentum;momentum*=0.94}
    else{offset-=0.4}
    update();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Drag
const pw=panoSec;
pw.addEventListener('mousedown',e=>{dragging=true;dragX=e.clientX;momentum=0;if(!interacted){interacted=true;stripHint.classList.add('gone')}});
document.addEventListener('mousemove',e=>{if(!dragging)return;const dx=e.clientX-dragX;dragX=e.clientX;offset+=dx;momentum=dx;update()});
document.addEventListener('mouseup',()=>dragging=false);
pw.addEventListener('touchstart',e=>{dragging=true;dragX=e.touches[0].clientX;momentum=0;if(!interacted){interacted=true;stripHint.classList.add('gone')}},{passive:true});
document.addEventListener('touchmove',e=>{if(!dragging)return;const dx=e.touches[0].clientX-dragX;dragX=e.touches[0].clientX;offset+=dx;momentum=dx;update()},{passive:true});
document.addEventListener('touchend',()=>dragging=false);

// Explore expand
document.getElementById('exploreBtn').addEventListener('click',()=>{
  expanded=true;
  panoSec.classList.add('expanded');
  topSec.style.cssText='opacity:0;pointer-events:none;position:absolute;';
  botSec.classList.add('hidden');
  expUI.classList.add('show');
});

// Close
document.getElementById('closeBtn').addEventListener('click',()=>{
  expanded=false;
  panoSec.classList.remove('expanded');
  topSec.style.cssText='';
  botSec.classList.remove('hidden');
  expUI.classList.remove('show');
});

window.addEventListener('resize',()=>{W=window.innerWidth;H=window.innerHeight;if(img1.offsetWidth)imgW=img1.offsetWidth;update()});

// ── AMBIENT AUDIO ENGINE ──
const soundBtn=document.getElementById('soundBtn');
let audioCtx=null, audioStarted=false, audioMuted=false;
let masterGain=null;

function createAmbient(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.setValueAtTime(0,audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(1.0,audioCtx.currentTime+2);
  masterGain.connect(audioCtx.destination);

  // Long reverb
  const convolver=audioCtx.createConvolver();
  const reverbLen=4*audioCtx.sampleRate;
  const reverbBuf=audioCtx.createBuffer(2,reverbLen,audioCtx.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=reverbBuf.getChannelData(ch);
    for(let i=0;i<reverbLen;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/reverbLen,2);
  }
  convolver.buffer=reverbBuf;
  convolver.connect(masterGain);

  const wetGain=audioCtx.createGain();
  wetGain.gain.value=0.8;
  wetGain.connect(convolver);
  const dryGain=audioCtx.createGain();
  dryGain.gain.value=0.4;
  dryGain.connect(masterGain);

  // Warm triangle wave pad — steady, no vibration
  const padNotes=[174.61,220.00,261.63,329.63,392.00]; // F3,A3,C4,E4,G4
  padNotes.forEach((freq,i)=>{
    const osc=audioCtx.createOscillator();
    osc.type='triangle';
    osc.frequency.value=freq;
    const g=audioCtx.createGain();
    g.gain.value=0.18-i*0.02;
    osc.connect(g);
    g.connect(dryGain);
    g.connect(wetGain);
    osc.start();
  });

  // Deep sub bass hum
  const sub=audioCtx.createOscillator();
  sub.type='sine';
  sub.frequency.value=65.41; // C2
  const subG=audioCtx.createGain();
  subG.gain.value=0.15;
  sub.connect(subG);
  subG.connect(dryGain);
  sub.start();

  // Warm filtered noise — room ambience
  const nBuf=audioCtx.createBuffer(1,3*audioCtx.sampleRate,audioCtx.sampleRate);
  const nD=nBuf.getChannelData(0);
  for(let i=0;i<nD.length;i++) nD[i]=Math.random()*2-1;
  const nSrc=audioCtx.createBufferSource();
  nSrc.buffer=nBuf;nSrc.loop=true;
  const nFilt=audioCtx.createBiquadFilter();
  nFilt.type='lowpass';nFilt.frequency.value=300;nFilt.Q.value=0.3;
  const nG=audioCtx.createGain();
  nG.gain.value=0.06;
  nSrc.connect(nFilt);nFilt.connect(nG);nG.connect(wetGain);
  nSrc.start();

  // Piano-like bell tones repeating
  function bell(){
    if(audioMuted||!audioCtx)return;
    const bellFreqs=[523.25,587.33,659.25,783.99,880.00,1046.50];
    const f=bellFreqs[Math.floor(Math.random()*bellFreqs.length)];
    const o=audioCtx.createOscillator();
    o.type='sine';
    o.frequency.value=f;
    // Second harmonic for richness
    const o2=audioCtx.createOscillator();
    o2.type='sine';
    o2.frequency.value=f*2;
    const g=audioCtx.createGain();
    g.gain.setValueAtTime(0,audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.2,audioCtx.currentTime+0.05);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+4);
    const g2=audioCtx.createGain();
    g2.gain.setValueAtTime(0,audioCtx.currentTime);
    g2.gain.linearRampToValueAtTime(0.06,audioCtx.currentTime+0.02);
    g2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+2);
    o.connect(g);g.connect(wetGain);
    o2.connect(g2);g2.connect(wetGain);
    o.start();o2.start();
    o.stop(audioCtx.currentTime+5);o2.stop(audioCtx.currentTime+3);
    setTimeout(bell,3000+Math.random()*4000);
  }
  setTimeout(bell,1500);

  audioStarted=true;
}

function toggleAudio(){
  if(!audioStarted){
    createAmbient();
    soundBtn.classList.remove('muted');
    return;
  }
  if(audioMuted){
    audioMuted=false;
    masterGain.gain.linearRampToValueAtTime(1.0,audioCtx.currentTime+0.5);
    soundBtn.classList.remove('muted');
    if(audioCtx.state==='suspended')audioCtx.resume();
  }else{
    audioMuted=true;
    masterGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.5);
    soundBtn.classList.add('muted');
  }
}

soundBtn.addEventListener('click',toggleAudio);

// Auto-start immediately on any interaction (browser requires it)
function autoStartAudio(){
  if(!audioStarted) createAmbient();
  document.removeEventListener('click',autoStartAudio);
  document.removeEventListener('touchstart',autoStartAudio);
  document.removeEventListener('mousedown',autoStartAudio);
}
document.addEventListener('click',autoStartAudio);
document.addEventListener('touchstart',autoStartAudio);
document.addEventListener('mousedown',autoStartAudio);

// Also try on page load (some browsers allow it)
window.addEventListener('load',()=>{
  if(!audioStarted){
    try{createAmbient()}catch(e){}
  }
});

</script>
